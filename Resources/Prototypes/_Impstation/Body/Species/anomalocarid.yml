- type: entity
  parent:
  - AppearanceAnomalocarid
  - BaseSpeciesMobOrganic
  id: MobAnomalocarid
  name: Urist McBlblbl
  components:
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.4 # a little less barotrauma
        Heat: 0.1
  - type: Temperature
    specificHeat: 42 # down from 50
  - type: TemperatureDamage # anomalocarids are benthic hydrothermal vent dwellers, they love high pressure and high heat
    heatDamageThreshold: 4000
    coldDamageThreshold: 260
    coldDamage:
      types:
        Cold : 1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      293: 0.8
      280: 0.6
      260: 0.4
  - type: Damageable
    damageModifierSet: Anomalocarid
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Impstation/Mobs/Effects/anomalocarid_brute_damage.rsi #imp edit, waiting on proper macro merge to migrate files
        color: "#18d6a7"
      Burn:
        sprite: _Impstation/Mobs/Effects/anomalocarid_burn_damage.rsi #imp edit, waiting on proper macro merge to migrate files
  - type: Flammable
    damage:
      types:
        Heat: 1.3 #takes just a little bit more to light them on fire
  - type: FireVisuals
    sprite: _Impstation/Mobs/Effects/anomalocarid_onfire.rsi #too big for normal onfire states, they need their own rsi #imp edit, waiting on proper macro merge to migrate files
    normalState: Generic_mob_burning_anomalocarid #same as the regular sprite, just resized to fit anomalocarids
    alternateState: Standing_anomalocarid
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: AnomalocaridCopperBlood #similar to CopperBlood, just a different color.
        Quantity: 300
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeatCrab
        amount: 5
  - type: MeleeWeapon
    attackRate: 0.6 #slower swing because they hit harder
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 8
  - type: ActionGun
    action: ActionAnomalocaridSpit
    gunProto: AnomalocaridSpitGun
  - type: HeatVent
    tooHotPopups:
      - anomalocarid-vent-toohot1
      - anomalocarid-vent-toohot2
      - anomalocarid-vent-toohot3
  - type: AnomalocaridAccent
  - type: ZombieAccentOverride
    accent: zombieAnomalocarid
  - type: Vomiter
    vomitPrototype: ShrimpSoda
  - type: StatusIcon
    bounds: -0.5,-0.5,0.5,1.3
  - type: TypingIndicator
    proto: anomalocarid
  - type: Speech
    speechBubbleOffset: 0.35
    speechVerb: Anomalocarid
    speechSounds: Anomalocarid
    allowedEmotes: ['Click', 'Chitter', 'Bubble', 'Pop']
    suffixSpeechVerbs:
      chat-speech-verb-suffix-exclamation-strong: AnomalocaridExclamationStrong
      chat-speech-verb-suffix-exclamation: AnomalocaridExclamation
      chat-speech-verb-suffix-stutter: AnomalocaridStutter
  - type: Vocal
    sounds:
      Male: UnisexAnomalocarid
      Female: UnisexAnomalocarid
      Unsexed: UnisexAnomalocarid
  - type: Tag
    tags:
    - AnomalocaridClaw #this exists so they can dig through rocks
    - DoorBumpOpener
    - CanPilot
    - FootstepSound
    - AnomalyHost
  # imp edit start
  - type: LightningTarget # lightning is more likely to strike the tallest thing in a location. so.
    priority: 4
    lightningExplode: false
  # imp edit end


  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_anomalocarid
    offset: 0, 0.375
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300 #big
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
#      fix2: #fixture for head, dunno how to do this right yet
