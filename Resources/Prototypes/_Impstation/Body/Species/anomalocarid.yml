- type: entity
  parent: [ OrganBaseKidneys, OrganAnomalocaridInternal, OrganAnomalocaridMetabolizer ]
  id: OrganAnomalocaridKidneys
  description: "Eww! They're sticky and stretchy!"
  components:
  - type: Clothing
    quickEquip: false
    equippedPrefix: kidney
    slots:
    - HEAD
    clothingVisuals:
      head:
      - state: kidney-equipped-HELMET
  - type: FlavorProfile
    flavors:
      - sour
      - sweet
      - shrimp
  - type: EmitSoundOnThrow
    sound: /Audio/Weapons/bolathrow.ogg
  - type: EmitSoundOnLand
    sound: /Audio/Effects/gib3.ogg
  - type: Damageable #for the ensnaring behavior
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/gib3.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: LandAtCursor
  - type: Ensnaring #think fast chucklenuts!
    freeTime: 2.0
    breakoutTime: 1.5
    walkSpeed: 0.8
    sprintSpeed: 0.5
    staminaDamage: 0
    canThrowTrigger: true
    canMoveBreakout: true
    maxEnsnares: 1
