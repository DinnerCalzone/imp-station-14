  # IMP EDIT END
    species: Decapoid

- type: entity
  parent:
  - AppearanceDecapoid
  - BaseSpeciesMobOrganic
  id: MobDecapoid
  name: Urist McCrab
  components:
  - type: Barotrauma
    damage:
      types:
        Blunt: 0 # immune to space
  - type: Hunger
  - type: Thirst
    baseDecayRate: -1 # Make it so they never get thirsty. We can't just remove the component
  - type: TemperatureDamage
    heatDamageThreshold: 380 # slightly more vulnerable to heat
    coldDamageThreshold: 0 # immune to space
    coldDamage:
      types:
        Cold : 0 # immune to space
    heatDamage:
      types:
        Heat : 1.5
  - type: Temperature
    currentTemperature: 310
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds:
      293: 1.0
      280: 1.0
      260: 1.0
  - type: Clumsy
    clumsyVaulting: false
    clumsyHypo: false
    clumsyDefib: false
    clumsyCatching: false
    gunShootFailDamage:
      types:
        Blunt: 5
    clumsySound:
      path: /Audio/_Impstation/Effects/Clumsy/crab_snap.ogg # the game gets really touchy about having that initial forward slash. #imp edit, waiting on proper macro merge to migrate files
    #imp edit start, gun whitelist not on macro
    gunWhitelist:
      tags:
      - Crusher
    gunFailedMessage: gun-clumsy-decapoid # The gun slips out of your claws!
    #imp edit end
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: CopperBlood # real life crustaceans are in the same clade as spiders and share a blood type
        Quantity: 300
  - type: Puller #TODO: port pull speed modifier
    needsHands: false # they drag with the claw, or their back legs
    applySpeedModifier: false #imp edit, they're strong as fuck. also i made this variable just for them.
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 325 # youre the heaviest. dont let anyone else trick you.
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepDecapoid
  - type: Vocal
    sounds:
      Male: UnisexDecapoid
      Female: UnisexDecapoid
      Unsexed: UnisexDecapoid # male and female sounds have to 1) exist and 2) come first, otherwise urists will spawn without emote sounds 66% of the time, because this game is poorly programmed
  - type: SpeechRequiresEquipment
    whitelist:
      tags:
      - Vaporizer
      - SGD
    failMessage: decapoid-cant-speak
  - type: Speech
    speechSounds: Decapoid
    allowedEmotes: [ 'Click', 'Chitter' ]
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.5 # move more easily in space
    baseWeightlessFriction: 2 # more control over movement in space
    baseWeightlessModifier: 1
  - type: TypingIndicator
    proto: robot
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Decapoid
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Impstation/Mobs/Effects/decapoid_brute_damage.rsi #imp edit, waiting on proper macro merge to migrate files
        color: "#162581"
  - type: BlockInjection
    failurePopup: block-injection-decapoid
  - type: CanWieldOneHanded
  - type: CarrierOneHand #imp edit, carrying

- type: entity # For testing purposes.
  save: false
  id: BaseMobDecapoidInternals
  parent: MobDecapoid
  suffix: SpawnsWithInternals
  components:
  - type: Loadout
