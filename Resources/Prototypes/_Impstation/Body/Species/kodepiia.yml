      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Kodepiia/displacement.rsi #imp edit, waiting on proper macro merge to migrate files
            state: hands
  # IMP EDIT START: TO BE REWORKED BY VISUAL NUBODY
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganKodepiiaTorso
        - id: OrganKodepiiaHead
        - id: OrganKodepiiaLegLeft
        - id: OrganKodepiiaLegRight
        - id: OrganKodepiiaFootLeft
        - id: OrganKodepiiaFootRight
        - id: OrganKodepiiaBrain
        - id: OrganKodepiiaEyes
        - id: OrganKodepiiaTongue
        - id: OrganKodepiiaAppendix
        - id: OrganKodepiiaEars
        - id: OrganKodepiiaLungs
        - id: OrganKodepiiaHeart
        - id: OrganKodepiiaStomach
        - id: OrganKodepiiaLiver
        - id: OrganKodepiiaKidneys
  - type: HumanoidAppearance
    # IMP EDIT END
    species: Kodepiia
    hideLayersOnEquip: #imp edit, to be reworked by visual nubody
    - HeadTop
    - HeadSide
    - Hair
    - RArmExtension
    - Tail

- type: entity
  parent:
  - AppearanceKodepiia
  - BaseSpeciesMobOrganic
  id: MobKodepiia
  name: Urist McSquid
  components:
  - type: KodepiiaScrambler
  - type: ConsumeAction
    popupSelfStart: kodepiia-consume-start-self
    popupSelfEnd: kodepiia-consume-end-self
    popupOthersStart: kodepiia-consume-start-others
    popupOthersEnd: kodepiia-consume-end-self
    consumeActionId: ActionKodepiiaConsume
    damage:
      types:
        Cellular: 15
        Piercing: 15
    whitelist:
      components:
      - Respirator
      - Bloodstream
    blacklist:
      components:
      - SiliconLawBound
  - type: TypingIndicator
    proto: kodepiia
  - type: Speech
    speechSounds: Kodepiia
    speechVerb: Kodepiia
    allowedEmotes: ['Hiss', 'Snarl', 'KodeHonk', 'KodeRing', 'KodePew', 'KodeBang', 'KodeBeep', 'KodeRev', 'Caw', 'Squish', 'Chitter', 'Squeak', 'Click', 'Squish', 'Coo', 'Boom', 'Chirp', 'Bubble', 'Pop'] # imp edit, i'm not marking what's different between this and macro because jesus christ
  - type: Vocal
    sounds:
      Male: Kodepiia
      Female: Kodepiia
      Unsexed: Kodepiia
  - type: Damageable
    damageModifierSet: Kodepiia
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#4f0000"
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: BloodKodepiia
        Quantity: 300 #imp edit, will need to be doubled by solutions refactor
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcPunch
    soundHit:
      collection: BoxingHit
    damage:
      types:
        Blunt: 5
  - type: Butcherable
    spawned:
    - id: FoodMeatKodepiia
      amount: 5
  - type: Thirst
  - type: Hunger
    baseDecayRate: 0.15 # 10x default. 6 minutes to hungry and 15.5 minutes to starving
  - type: Respirator
    breathVolume: 1 # Twice as much - makes kodes sensitive to waste gases
    updateIntervalMultiplier: 0.5 # Twice as fast
    gaspEmoteCooldown: 4 # Twice as frequent
  # imp edit start
  - type: HarpySinger
  - type: SwappableInstrument
    instrumentList:
      "Voice": { 52: 0 }
      "Trumpet": { 56: 0 }
      "Electric": { 27: 0 }
      "Bass": { 33: 0 }
      "Rock": { 29: 0 }
      "Acoustic": { 24: 0 }
      "Flute": { 73: 0 }
      "Sax": { 66: 0 }
      "Piano": { 1: 0 }
      "Church Organ": { 19: 0 }
      "Harp": { 46: 0 }
    onlySetBySelf: true
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: InstrumentVisuals
  - type: GenericVisualizer
    visuals:
      enum.InstrumentVisuals.Playing:
        enum.InstrumentVisuals.Layer:
          False: { visible: false }
          True: { visible: true }
  # imp edit end


