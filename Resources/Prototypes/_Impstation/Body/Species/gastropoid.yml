- type: entity
  parent:
  - AppearanceGastropoid
  - BaseSpeciesMobOrganic
  id: MobGastropoid
  name: Uristsiru McShell
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatSnail
      amount: 5
    - id: SeashellInstrument #imp edit
      amount: 1
  - type: TemperatureDamage
    heatDamageThreshold: 380
    coldDamageThreshold: 285
    coldDamage:
      types:
        Cold : 0.5 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 310
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds: # removes their temp speed restrictions. this is hacky and sucks.
      293: 1.0
      280: 1.0
      260: 1.0
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: CopperBlood
        Quantity: 300
  - type: Tag
    tags:
      - DoorBumpOpener
      - CanPilot
      - FootstepSound
      - AnomalyHost
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300 # this matches diona
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/_Impstation/Effects/Footsteps/snailstep.ogg #imp edit, waiting on proper macro merge to migrate files
  - type: Vocal
    sounds:
      Male: UnisexSnail
      Female: UnisexSnail
      Unsexed: UnisexSnail
  - type: BodyEmotes
    soundsId: GastropoidBodyEmotes
  - type: GastropoidAccent
  - type: Reactive
    reactions:
    - reagents: [ Diphenhydramine, Lipozine, Oculine, Saline, Fresium, Hotsauce, TableSalt, Bleach, SodiumCarbonate, PestKiller, Posca ] # theres got to be a better way of doing this.
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaling: true
        damage:
          types:
            Heat: 0.4
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "snail-hurt-by-chem-popup" ]
        probability: 1
  - type: MovementSpeedModifier
    baseSprintSpeed: 2.25
    baseWalkSpeed: 1.25
  - type: SnailSprint
    action: ActionSlime
    thirstCost: 100
    sprintLength: 2
    speedBoost: 1.5
    reagentProduced: Mucin
  - type: NoSlip
  - type: Magboots
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Gastropoid
  - type: TypingIndicator
    proto: Gastropoid

- type: entity
  parent: OrganBase
  id: OrganGastropoid
  abstract: true
  suffix: gastropoid

- type: entity
  id: OrganGastropoidMetabolizer
