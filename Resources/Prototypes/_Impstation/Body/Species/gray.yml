- type: entity
  parent:
  - AppearanceGray
  - BaseSpeciesMobOrganic
  id: MobGray
  name: Urist McGray
  components:
  - type: GrayAccent
  - type: TypingIndicator
    proto: gray
  - type: Vocal
    sounds:
      Male: UnisexGray
      Female: UnisexGray
      Unsexed: UnisexGray
  - type: Speech
    speechSounds: PVC
  - type: Damageable
    damageModifierSet: Gray
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: GrayBlood
        Quantity: 300
  # imp edit start #TODO: upstream fixing this to macro, grays should have one entity instead of two
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r smaller #they r smaller (2)
        density: 100
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#00ff04"
  # actual imp additions start here
  - type: HomunculusType
    homunculusType: HomunculusGray
    recipe:
      SynthFlesh: 20
      Saline: 20
  - type: IrradiatedDamage
    #8% of rads is converted to healing per type
    #1 full stack of uranium sheets in your inventory is just under .3 rads, resulting in 1.44 healing per type per minute, .04 more healing than from PassiveDamage component
    damageCoefficients:
      Blunt: -0.08
      Slash: -0.08
      Piercing: -0.08
    #capped at 10.2 healing per minute per type, which is reached at 2 rads per second
    #essentially a full duffel bag of uranium sheets, being near a couple uranium crabs, or being near the supermatter without protection
    damageLimits:
      Blunt: -0.17
      Slash: -0.17
      Piercing: -0.17
    allowedTypesByState: #does not allow for healing when dead. a little messy looking, but allows for the most flexibility
      Alive:
      - Blunt
      - Slash
      - Piercing
      Critical:
      - Blunt
      - Slash
      - Piercing
    # imp edit end


