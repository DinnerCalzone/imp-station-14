- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceThaven
  categories: [ HideSpawnMenu ]
  name: thaven appearance
  components:
  - type: Inventory
    speciesId: thaven
    templateId: thaven
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi #imp edit, waiting on proper macro merge to migrate files
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi #imp edit, waiting on proper macro merge to migrate files
            state: outerclothing_hardsuit
      head:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi #imp edit, waiting on proper macro merge to migrate files
            state: head
      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi #imp edit, waiting on proper macro merge to migrate files
            state: hands
  # IMP EDIT START: TO BE REWORKED BY VISUAL NUBODY
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganThavenTorso
        - id: OrganThavenHead
        - id: OrganThavenArmLeft
        - id: OrganThavenArmRight
        - id: OrganThavenHandRight
        - id: OrganThavenHandLeft
        - id: OrganThavenLegLeft
        - id: OrganThavenLegRight
        - id: OrganThavenFootLeft
        - id: OrganThavenFootRight
        - id: OrganThavenBrain
        - id: OrganThavenEyes
        - id: OrganThavenLungs
        - id: OrganThavenHeart
        - id: OrganThavenStomach
        - id: OrganThavenLiver
        - id: OrganThavenKidneys
  - type: HumanoidAppearance
  # IMP EDIT END
    species: Thaven
    hideLayersOnEquip: #imp edit, to be reworked by visual nubody
    - Hair
    - Snout
    - HeadSide

- type: entity
  parent:
  - AppearanceThaven
  - BaseSpeciesMobOrganic
  id: MobThaven
  name: Urist McEars
  components:
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ff624a"
  - type: Damageable
    damageModifierSet: Thaven
  - type: Butcherable
    spawned:
    - id: FoodThavenMeat
      amount: 5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ShimmeringBlood
        Quantity: 600
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120 # dainty fucking elves
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: TypingIndicator
    proto: thaven # DeltaV unique typing indicator
  - type: Vocal
    sounds:
      Male: MaleThaven
      Female: FemaleThaven
      Unsexed: UnisexThaven #imp edit
  - type: Speech
    speechSounds: Alto
  - type: ThavenAccent
  - type: StrangeMoods
    mood: ThavenMoods
  - type: IonStormTarget
  - type: MeleeWeapon
    attackRate: 0.55
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 18
  # imp edit start
  - type: HomunculusType
    homunculusType: HomunculusThaven
    recipe:
      SynthFlesh: 20
      Saline: 20
  # imp edit end

- type: entity
  parent: OrganBase
  id: OrganThaven
  abstract: true
  suffix: thaven

- type: entity
  id: OrganThavenMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Thaven ]

- type: entity
  parent: [ OrganThaven, OrganBaseOrganic ]
  id: OrganThavenInternal
  abstract: true
  components:
  - type: Sprite
    sprite: _Impstation/Mobs/Species/Thaven/organs.rsi #imp edit, waiting on proper macro merge to migrate files
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: CarpoToxin
        Quantity: 5
  - type: FlavorProfile
    flavors:
      - thavenflesh
  - type: Solution
    solution:
      reagents:
      - ReagentId: UncookedAnimalProteins
        Quantity: 10
      - ReagentId: CarpoToxin
        Quantity: 10

