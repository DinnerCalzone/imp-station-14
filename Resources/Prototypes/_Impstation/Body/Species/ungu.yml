- type: entity
  parent:
  - AppearanceUngu
  - BaseSpeciesMobOrganic
  id: MobUngu
  name: Urist McHooves
  components:
  - type: CowToolProficiency
  - type: Pullable
  - type: StatusIcon
    bounds: -0.5,-0.5,0.5,0.7
  - type: MovementSpeedModifier
    baseSprintSpeed: 2.9
    baseWalkSpeed: 1.3
  - type: CombatModeSprint
    stunSeconds: 1
    doImpactDamage: true
    beginCombatMessage: "ungu-begin-combat-popup"
  - type: CombatModeVisuals
    sprite:
      sprite: _Impstation/Mobs/Species/Ungu/parts.rsi #imp edit, waiting on proper macro merge to migrate files
      state: angry
  - type: CombatMode
  - type: MeleeWeapon
    attackRate: 0.6
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 8
        Structural: 12
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 12
        Structural: 20
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      200: Dead
  - type: StaminaDamageOnHit
    damage: 18
  - type: Hunger
    thresholds:
      Overfed: 150
      Okay: 100
      Peckish: 50
      Starving: 25
      Dead: 0
    baseDecayRate: 0.0124 # 3/4 as fast as a human
  - type: Thirst
  - type: Icon
    sprite: _Impstation/Mobs/Species/Ungu/parts.rsi #imp edit, waiting on proper macro merge to migrate files
    state: full
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300 #STOP! BEING! 500!!!
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexUngu
      Female: UnisexUngu
      Unsexed: UnisexUngu
  - type: BodyEmotes
    soundsId: UnguBodyEmotes
  - type: Damageable
    damageModifierSet: Ungu
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 200
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 3.0 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 300 #imp edit, will be raised to 600 with the solutions refactor pr
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Impstation/Mobs/Effects/ungu_brute_damage.rsi #imp edit, waiting on proper macro merge to migrate files
        color: "#ff624a"
  - type: Speech
    speechSounds: Ungu
    allowedEmotes: ['Moo']
  - type: TypingIndicator
    proto: Ungu
  - type: JumpAbility
    action: ActionDash
    jumpDistance: 4
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: .5
        volume: -3
        variation: 0.05
